name: Remote Trigger Relay

on:
  repository_dispatch:
    types: [remote_trigger_scraper]
  workflow_dispatch: # ◄ This line adds the manual "Run workflow" button!

jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Private Scraper
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: bearer ${{ secrets.HIDDEN_SCRAPER_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/CyberDefenderDavid/mezastar-scraper-vn/actions/workflows/run_scraper.yml/dispatches \
            -d '{"event_type": "remote_trigger_scraper"}'
