<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Mezastar ID Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            margin-top: 0;
            color: #1e293b;
            font-size: 24px;
        }
        .stats {
            margin-bottom: 20px;
            font-weight: 600;
            color: #1e40af;
            background: #dbeafe;
            padding: 12px 20px;
            border-radius: 8px;
            display: inline-block;
            font-size: 16px;
            border: 1px solid #bfdbfe;
        }
        #runScraperBtn {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            display: block;
            width: 100%;
            transition: background-color 0.2s;
        }
        #runScraperBtn:hover:not(:disabled) {
            background-color: #059669;
        }
        #search {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        #search:focus {
            border-color: #3b82f6;
        }
        
        /* New Filter Buttons styling */
        .filter-container {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .filter-btn {
            background-color: #f1f5f9;
            color: #475569;
            border: 1px solid #cbd5e1;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover {
            background-color: #e2e8f0;
        }
        .filter-btn.active {
            background-color: #3b82f6;
            color: white;
            border-color: #2563eb;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 14px;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background-color: #f8fafc;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }
        tr:hover {
            background-color: #f8fafc;
        }
        .id-badge {
            font-family: monospace;
            background: #f1f5f9;
            color: #334155;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid #e2e8f0;
        }
        .timestamp {
            color: #64748b;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Pokémon Mezastar VN Live Dashboard</h1>
    
    <div id="statsCounter" class="stats">🔄 Reading log database...</div>
    
    <button id="runScraperBtn" onclick="triggerScraper()">🚀 Force Run Mezastar Scraper Now</button>
    
    <input type="text" id="search" placeholder="🔍 Search by Ticket ID..." onkeyup="applyFilters()">

    <div class="filter-container">
        <button class="filter-btn active" onclick="setPatternFilter('all', this)">All IDs</button>
        <button class="filter-btn" onclick="setPatternFilter('pair', this)">Pairs (AA)</button>
        <button class="filter-btn" onclick="setPatternFilter('trips', this)">3 of a Kind (AAA)</button>
        <button class="filter-btn" onclick="setPatternFilter('straight', this)">Straights (123/345)</button>
        <button class="filter-btn" onclick="setPatternFilter('lucky', this)">Lucky Digits (6 & 8)</button>
    </div>

    <table id="logTable">
        <thead>
            <tr>
                <th>Timestamp (UTC)</th>
                <th>Ticket ID</th>
            </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
    </table>
</div>

<script>
    let currentPatternFilter = 'all';

    async function loadLogs() {
        try {
            const response = await fetch('scraper_log.txt');
            if (!response.ok) throw new Error('Log file not found yet');
            
            const text = await response.text();
            // Match logic adjusted to pull log patterns safely
            const regex = /\[(.*?)\]\s+.*Scraped ID:\s+(VN_\d+)/g;
            let match;
            
            const uniqueEntries = new Map();

            while ((match = regex.exec(text)) !== null) {
                const timestamp = match[1];
                const ticketId = match[2];
                uniqueEntries.set(ticketId, timestamp);
            }

            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = ""; 
            
            const sortedEntries = Array.from(uniqueEntries.entries()).sort((a, b) => new Date(b[1]) - new Date(a[1]));

            sortedEntries.forEach(([ticketId, timestamp]) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="timestamp">${timestamp}</td>
                    <td><span class="id-badge">${ticketId}</span></td>
                `;
                tableBody.appendChild(row);
            });

            document.getElementById('statsCounter').innerText = `📊 Total Unique Tickets Found: ${uniqueEntries.size}`;
            applyFilters(); // Apply current configurations immediately after download

        } catch (error) {
            console.error('Error loading log data:', error);
            document.getElementById('statsCounter').innerText = "💡 Waiting for the first log push from your scraper...";
        }
    }

    // Pattern categorization engine
    function matchesPattern(idString, pattern) {
        const numbersOnly = idString.replace(/\D/g, ''); // Pull pure 10 digits
        if (!numbersOnly) return false;

        switch(pattern) {
            case 'pair':
                // Finds matching repeating pairs like 11, 22, 55
                return /(\d)\1/.test(numbersOnly);
            case 'trips':
                // Finds 3-of-a-kind blocks like 777 or 000
                return /(\d)\1\1/.test(numbersOnly);
            case 'straight':
                // Checks for 3-digit incrementing or decrementing scales
                for (let i = 0; i < numbersOnly.length - 2; i++) {
                    const n1 = parseInt(numbersOnly[i]);
                    const n2 = parseInt(numbersOnly[i+1]);
                    const n3 = parseInt(numbersOnly[i+2]);
                    if ((n2 === n1 + 1 && n3 === n2 + 1) || (n2 === n1 - 1 && n3 === n2 - 1)) {
                        return true;
                    }
                }
                return false;
            case 'lucky':
                // Checks if ticket contains oriental luck targets: 6 or 8
                return numbersOnly.includes('6') || numbersOnly.includes('8');
            default:
                return true;
        }
    }

    function setPatternFilter(pattern, element) {
        currentPatternFilter = pattern;
        
        // Handle Active Button Layouts
        const buttons = document.getElementsByClassName('filter-btn');
        for (let btn of buttons) {
            btn.classList.remove('active');
        }
        element.classList.add('active');
        
        applyFilters();
    }

    // Unified UI view handling combined logic filtering
    function applyFilters() {
        const searchInput = document.getElementById('search').value.toUpperCase();
        const rows = document.getElementById('tableBody').getElementsByTagName('tr');

        for (let i = 0; i < rows.length; i++) {
            const idCell = rows[i].getElementsByTagName('td')[1];
            if (idCell) {
                const txtValue = idCell.textContent || idCell.innerText;
                
                const matchesSearch = txtValue.toUpperCase().indexOf(searchInput) > -1;
                const matchesBtnPattern = matchesPattern(txtValue, currentPatternFilter);

                if (matchesSearch && matchesBtnPattern) {
                    rows[i].style.display = "";
                } else {
                    rows[i].style.display = "none";
                }
            }
        }
    }

    async function triggerScraper() {
        const btn = document.getElementById('runScraperBtn');
        btn.disabled = true;
        btn.innerText = "⏳ Signaling Scraper to Start...";
        btn.style.backgroundColor = "#9ca3af";

        try {
            const response = await fetch('https://api.github.com/repos/pokemon-mezastar/mezastar-vn-id/dispatches', {
                method: 'POST',
                headers: {
                    'Accept': 'application/vnd.github+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    event_type: 'remote_trigger_scraper'
                })
            });

            if (response.ok || response.status === 204 || response.status === 202) {
                btn.innerText = "✅ Scraper Triggered Successfully! (Takes ~2 mins)";
                btn.style.backgroundColor = "#059669";
            } else {
                throw new Error(`API Activation Rejected: Status ${response.status}`);
            }
        } catch (error) {
            console.error(error);
            btn.innerText = "❌ Activation Failed. Try again.";
            btn.style.backgroundColor = "#dc2626";
            btn.disabled = false;
        }
    }

    window.onload = loadLogs;
</script>

</body>
</html>
