<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Mezastar ID Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            margin-top: 0;
            color: #1e293b;
            font-size: 24px;
        }
        .stats {
            margin-bottom: 20px;
            font-weight: 600;
            color: #1e40af;
            background: #dbeafe;
            padding: 12px 20px;
            border-radius: 8px;
            display: inline-block;
            font-size: 16px;
            border: 1px solid #bfdbfe;
        }
        #search {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        #search:focus {
            border-color: #3b82f6;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 14px;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background-color: #f8fafc;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }
        tr:hover {
            background-color: #f8fafc;
        }
        .id-badge {
            font-family: monospace;
            background: #f1f5f9;
            color: #334155;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid #e2e8f0;
        }
        .timestamp {
            color: #64748b;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Pokémon Mezastar VN Live Dashboard</h1>
    
    <div id="statsCounter" class="stats">🔄 Reading log database...</div>
    
    <input type="text" id="search" placeholder="🔍 Search by Ticket ID or Timestamp..." onkeyup="filterTable()">

    <table id="logTable">
        <thead>
            <tr>
                <th>Timestamp (UTC)</th>
                <th>Ticket ID</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>
    async function loadLogs() {
        try {
            // Pointing directly to the scraper_log.txt pushed into this repo
            const response = await fetch('scraper_log.txt');
            if (!response.ok) throw new Error('Log file not found yet');
            
            const text = await response.text();
            
            // Regex matches timestamp blocks and the parsed VN IDs
            const regex = /\[(.*?)\]\s+Scraped ID:\s+(VN_\d+)/g;
            let match;
            
            const uniqueEntries = new Map();

            while ((match = regex.exec(text)) !== null) {
                const timestamp = match[1];
                const ticketId = match[2];
                // Map naturally filters duplicates, keeping only the absolute latest entry per ID
                uniqueEntries.set(ticketId, timestamp);
            }

            const tableBody = document.getElementById('tableBody');
            
            // Sort database chronologically so newest tickets show up first
            const sortedEntries = Array.from(uniqueEntries.entries()).sort((a, b) => new Date(b[1]) - new Date(a[1]));

            sortedEntries.forEach(([ticketId, timestamp]) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="timestamp">${timestamp}</td>
                    <td><span class="id-badge">${ticketId}</span></td>
                `;
                tableBody.appendChild(row);
            });

            // Update the layout component with the exact unique count discovered
            document.getElementById('statsCounter').innerText = `📊 Total Unique Tickets Found: ${uniqueEntries.size}`;

        } catch (error) {
            console.error('Error loading log data:', error);
            document.getElementById('statsCounter').innerText = "💡 Waiting for the first log push from your scraper...";
        }
    }

    // Search function that hides/shows table rows instantaneously as you type
    function filterTable() {
        const input = document.getElementById('search').value.toUpperCase();
        const rows = document.getElementById('tableBody').getElementsByTagName('tr');

        for (let i = 0; i < rows.length; i++) {
            const txtValue = rows[i].textContent || rows[i].innerText;
            if (txtValue.toUpperCase().indexOf(input) > -1) {
                rows[i].style.display = "";
            } else {
                rows[i].style.display = "none";
            }
        }
    }

    window.onload = loadLogs;
</script>

</body>
</html>
