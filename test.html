<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test Relay Trigger</title>
</head>
<body style="padding: 50px; text-align: center; font-family: sans-serif;">

    <button id="runScraperBtn" onclick="triggerScraper()" style="padding: 15px 30px; font-size: 18px; cursor: pointer; background-color: #10b981; color: white; border: none; border-radius: 8px;">
        🚀 Force Run Scraper (Test)
    </button>

<script>
    async function triggerScraper() {
        let githubToken = sessionStorage.getItem('gh_relay_token');

        if (!githubToken) {
            githubToken = prompt("🔑 Please enter your GitHub Personal Access Token to authorize the relay:");
            if (!githubToken) return alert("Token is required.");
            sessionStorage.setItem('gh_relay_token', githubToken.trim());
        }

        const btn = document.getElementById('runScraperBtn');
        btn.disabled = true;
        btn.innerText = "⏳ Signaling Relay...";

        try {
            // Fires an event to the PUBLIC organization repo
            const response = await fetch('https://api.github.com/repos/pokemon-mezastar/mezastar-vn-id/dispatches', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${githubToken}`,
                    'Accept': 'application/vnd.github+json',
                    'X-GitHub-Api-Version': '2022-11-28',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    event_type: 'remote_trigger_scraper'
                })
            });

            if (response.status === 204 || response.status === 202 || response.ok) {
                btn.innerText = "✅ Signal Sent to Relay!";
                btn.style.backgroundColor = "#059669";
            } else {
                if (response.status === 401 || response.status === 403) sessionStorage.removeItem('gh_relay_token');
                throw new Error(`Rejected: Status ${response.status}`);
            }
        } catch (error) {
            console.error(error);
            btn.innerText = "❌ Failed.";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
