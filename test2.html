<!DOCTYPE html>
<html>
<body>
    <button onclick="runWorkflow()">🚀 Run Scraper</button>

    <script>
        async function runWorkflow() {
            // 1. Simple client-side UI prompt
            const passwordInput = prompt("Enter Secret Token to authenticate:");
            if (!passwordInput) return;

            try {
                // 2. Send the request with the password in the custom header
                const response = await fetch('https://eori84wb9d9inwt.m.pipedream.net', { 
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Scraper-Auth': passwordInput
                    }
                });

                alert('✅ Signal sent! Check GitHub to monitor execution.');
            } catch (error) {
                alert('❌ Network error failed to contact backend.');
                console.error(error);
            }
        }
    </script>
</body>
</html>
